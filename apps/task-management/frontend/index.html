<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク管理アプリ</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    
    <!-- iOS PWA対応 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="タスク管理">
</head>
<body>
    <div class="container-fluid mt-4 px-2">
        <header class="mb-4">
            <h1 class="display-5">📋 タスク管理</h1>
            <p class="text-muted">AWS Lambda + DynamoDBで動作するタスク管理アプリ</p>
        </header>

        <!-- タスク追加フォーム -->
        <section class="card mb-4 task-form-section" style="margin-left: 15%; margin-right: 15%;">
            <div class="card-header">
                <h2 class="h5 mb-0">新しいタスクを追加</h2>
            </div>
            <div class="card-body">
                <form id="task-form">
                    <div class="mb-3">
                        <label for="title" class="form-label">タイトル <span class="text-danger">*</span></label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="title" 
                            name="title" 
                            required 
                            maxlength="200"
                            placeholder="タスクのタイトルを入力"
                        >
                        <div class="form-text">最大200文字</div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">
                            説明 <span id="description-count" class="text-muted" style="display: none;"></span>
                        </label>
                        <div id="description-checklist" class="description-checklist">
                            <!-- チェックボックス付きリストがここに動的に追加されます -->
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="add-description-item-btn">
                            + 行を追加
                        </button>
                        <div class="form-text">最大2000文字（各行の合計）</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="dueDate" class="form-label">期日</label>
                            <input 
                                type="date" 
                                class="form-control" 
                                id="dueDate" 
                                name="dueDate"
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label">ステータス</label>
                            <select class="form-select" id="status" name="status">
                                <option value="todo">未完了</option>
                                <option value="done">完了</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span class="spinner-border spinner-border-sm d-none" id="submit-spinner" role="status"></span>
                        タスクを追加
                    </button>
                </form>
            </div>
        </section>

        <!-- アラート表示エリア -->
        <div id="alert-container"></div>

        <!-- タスク一覧 -->
        <section class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h2 class="h5 mb-0">タスク一覧</h2>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-info" id="bulk-operation-btn">
                        一括操作
                    </button>
                    <div id="bulk-actions" class="d-none">
                        <button class="btn btn-sm btn-outline-primary" id="bulk-edit-btn">
                            編集
                        </button>
                        <button class="btn btn-sm btn-outline-danger" id="bulk-delete-btn">
                            削除
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" id="cancel-bulk-operation-btn">
                            キャンセル
                        </button>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" id="refresh-btn">
                        🔄 更新
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">読み込み中...</span>
                    </div>
                </div>
                <div id="tasks-container" class="table-responsive">
                    <!-- タスクテーブルがここに動的に追加されます -->
                </div>
                <div id="empty-message" class="text-center text-muted py-4 d-none">
                    タスクがありません。上記のフォームから追加してください。
                </div>
            </div>
        </section>
    </div>

    <!-- 編集モーダル -->
    <div class="modal fade" id="editTaskModal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editTaskModalLabel">タスクを編集</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-task-form">
                        <input type="hidden" id="edit-task-id">
                        
                        <div class="mb-3">
                            <label for="edit-title" class="form-label">タイトル <span class="text-danger">*</span></label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="edit-title" 
                                name="title" 
                                required 
                                maxlength="200"
                                placeholder="タスクのタイトルを入力"
                            >
                            <div class="form-text">最大200文字</div>
                        </div>

                        <div class="mb-3">
                            <label for="edit-description" class="form-label">
                                説明 <span id="edit-description-count" class="text-muted" style="display: none;"></span>
                            </label>
                            <div id="edit-description-checklist" class="description-checklist">
                                <!-- チェックボックス付きリストがここに動的に追加されます -->
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="add-edit-description-item-btn">
                                + 行を追加
                            </button>
                            <div class="form-text">最大2000文字（各行の合計）</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="edit-dueDate" class="form-label">期日</label>
                                <input 
                                    type="date" 
                                    class="form-control" 
                                    id="edit-dueDate" 
                                    name="dueDate"
                                >
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="edit-status" class="form-label">ステータス</label>
                                <select class="form-select" id="edit-status" name="status">
                                    <option value="todo">未完了</option>
                                    <option value="done">完了</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" class="btn btn-primary" id="save-edit-btn">
                        <span class="spinner-border spinner-border-sm d-none" id="edit-spinner" role="status"></span>
                        保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 完了確認モーダル -->
    <div class="modal fade" id="completeTaskModal" tabindex="-1" aria-labelledby="completeTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="completeTaskModalLabel">タスク完了確認</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="complete-task-message"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-complete-btn" data-bs-dismiss="modal">いいえ</button>
                    <button type="button" class="btn btn-primary" id="confirm-complete-btn">はい</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 一括削除確認モーダル -->
    <div class="modal fade" id="bulkDeleteModal" tabindex="-1" aria-labelledby="bulkDeleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="bulkDeleteModalLabel">一括削除確認</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>一括で削除しますか？</p>
                    <p class="text-muted small" id="bulk-delete-count"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-bulk-delete-btn" data-bs-dismiss="modal">いいえ</button>
                    <button type="button" class="btn btn-danger" id="confirm-bulk-delete-btn">はい</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
